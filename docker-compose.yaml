services:

  # --- Kafka example ---

  kafka:
    image: bitnami/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles:
      - kafka

  kafka-setup:
    image: bitnami/kafka:latest
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic user-events --partitions 3
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic page-views --partitions 3
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic system-metrics --partitions 1
        echo "Topics created."
    profiles:
      - kafka

  sluice-kafka:
    image: ghcr.io/data-tier/sluice:0.1.0
    ports:
      - "8080:8080"
    volumes:
      - ./kafka/sluice.yaml:/etc/sluice/sluice.yaml:ro
      - ./kafka/schemas:/schemas:ro
    environment:
      SLUICE_CONFIG: /etc/sluice/sluice.yaml
    depends_on:
      kafka-setup:
        condition: service_completed_successfully
    profiles:
      - kafka

  # --- Pub/Sub example ---

  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:latest
    command: ["gcloud", "beta", "emulators", "pubsub", "start", "--host-port=0.0.0.0:8085", "--project=demo-project"]
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles:
      - pubsub

  pubsub-setup:
    image: curlimages/curl:8.5.0
    depends_on:
      pubsub-emulator:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        curl -s -X PUT http://pubsub-emulator:8085/v1/projects/demo-project/topics/user-events
        curl -s -X PUT http://pubsub-emulator:8085/v1/projects/demo-project/topics/page-views
        curl -s -X PUT http://pubsub-emulator:8085/v1/projects/demo-project/topics/system-metrics
        echo "Topics created."
    profiles:
      - pubsub

  sluice-pubsub:
    image: ghcr.io/data-tier/sluice:0.1.0
    ports:
      - "8080:8080"
    volumes:
      - ./pubsub/sluice.yaml:/etc/sluice/sluice.yaml:ro
      - ./pubsub/schemas:/schemas:ro
    environment:
      SLUICE_CONFIG: /etc/sluice/sluice.yaml
    depends_on:
      pubsub-setup:
        condition: service_completed_successfully
    profiles:
      - pubsub
